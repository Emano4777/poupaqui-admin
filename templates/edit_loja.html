<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Loja</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background: #f4f6fb;
            font-family: Arial, sans-serif;
        }

        .page-wrapper {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 15px;
        }

        .edit-card {
            background: #fff;
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: #1f2a44;
            margin-bottom: 25px;
        }

        .preview-container {
            text-align: center;
            margin-bottom: 25px;
        }

        .preview-label {
            font-weight: 600;
            margin-bottom: 10px;
            color: #334;
        }

        .preview-img {
            width: 100%;
            max-width: 380px;
            height: 260px;
            object-fit: cover;
            border-radius: 14px;
            border: 1px solid #dfe5ef;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
            background: #f1f3f8;
        }

        .form-label {
            font-weight: 600;
            color: #334;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px 14px;
            border: 1px solid #d9deea;
        }

        .form-control:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 0.18rem rgba(59, 130, 246, 0.15);
        }

        .btn-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .btn-custom {
            border-radius: 12px;
            padding: 10px 18px;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="page-wrapper">
    <div class="edit-card">
        <h2 class="page-title">Editar Loja</h2>

        <form method="POST" enctype="multipart/form-data">
            <div class="preview-container">
                <p class="preview-label">Imagem Atual:</p>
                <img id="preview" src="{{ loja.url }}" alt="Loja Atual" class="preview-img">
            </div>

            <div class="mb-3">
                <label for="file" class="form-label">Substituir Imagem</label>
                <input type="file" name="file" id="file" class="form-control" accept="image/*">
            </div>

            <div class="mb-3">
                <label for="cidade" class="form-label">Cidade</label>
                <input type="text" name="cidade" id="cidade" class="form-control" value="{{ loja.cidade }}" required>
            </div>

            <div class="mb-3">
                <label for="endereco" class="form-label">Endereço</label>
                <input type="text" name="endereco" id="endereco" class="form-control" value="{{ loja.endereco }}" required>
            </div>

            <div class="mb-3">
                <label for="telefone" class="form-label">Telefone</label>
                <input type="text" name="telefone" id="telefone" class="form-control" value="{{ loja.telefone }}" required>
            </div>

            <div class="mb-3">
                <label for="whatsapp" class="form-label">Link do WhatsApp</label>
                <input type="text" name="whatsapp" id="whatsapp" class="form-control" value="{{ loja.whatsapp }}" required>
            </div>

            <div class="btn-actions">
                <button type="submit" class="btn btn-primary btn-custom">Salvar Alterações</button>
                <a href="{{ url_for('admin_lojas') }}" class="btn btn-secondary btn-custom">Cancelar</a>
            </div>
        </form>
    </div>
</div>

<script>
    document.getElementById('file').addEventListener('change', function (event) {
        const file = event.target.files[0];
        if (file) {
            const img = document.getElementById('preview');
            img.src = URL.createObjectURL(file);
        }
    });
</script>
</body>
</html>
